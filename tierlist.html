html{scroll-behavior:smooth}

a{color:var(--gold);text-decoration:none}

nav{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:6px 20px;background:rgba(13,17,23,0.94);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid var(--border);height:52px}
nav .logo img{height:40px;width:auto}
nav ul{list-style:none;display:flex;gap:10px}
nav ul li a{color:var(--dim);font-size:13px;padding:4px 10px;border-radius:6px}
nav ul li a:hover{color:var(--gold);background:rgba(212,168,75,0.1)}
.container{max-width:980px;margin:0 auto;padding:0 16px 40px}
.hero{padding:76px 16px 20px;text-align:center;min-height:260px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;background:linear-gradient(180deg,rgba(217,96,74,0.08),transparent 80%),url(images/bg_pyro.jpg) center/cover fixed;-webkit-background-size:cover;-moz-background-size:cover;background-size:cover} .hero::before{content:"";position:absolute;inset:0;background:rgba(13,17,23,0.6);z-index:0} .hero>*{position:relative;z-index:1}
.hero h1{font-size:28px;font-weight:700;margin-bottom:4px}
.hero p{font-size:13px;color:var(--dim)}
.filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;padding:12px 0}
.filters select,.filters button{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;transition:.2s}
.filters select:hover,.filters button:hover{border-color:var(--gold)}
.tier-section{margin-bottom:18px}
.tier-header{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;margin-bottom:6px;font-weight:700;font-size:15px}
.tier-header .label{font-size:20px;font-weight:800}
.tier-t0{background:#d4a84b22;border:1px solid #d4a84b55;color:var(--gold)}

.tier-t4{background:#8b949e22;border:1px solid #8b949e55;color:var(--dim)}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:14px}
.char-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;cursor:pointer;transition:.2s;text-decoration:none;color:inherit}
.char-card:hover{transform:translateY(-2px);border-color:var(--gold)}
.char-card img{width:48px;height:48px;border-radius:50%;display:block;margin:0 auto 4px;object-fit:cover}
.char-card .name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char-card .sub{font-size:10px;color:var(--dim)}
.char-card .stars{font-size:9px;color:var(--gold)}
.el-tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;margin-top:2px}
footer{margin-top:32px;padding-top:12px;border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--dim)}

function getChar(id) {
  return charDataFallback.find(c => c.id === id) || {id, name:id, element:'anemo', rarity:5};
}

function render() {
  const roleF = document.getElementById('roleFilter').value;
  const elF = document.getElementById('elementFilter').value;
  const container = document.getElementById('tierlistContainer');
  container.innerHTML = '';
  
  for (let t = 0; t <= 4; t++) {
    const tierChars = Object.entries(tierData)
      .filter(([id, data]) => data.tier === t)
      .filter(([id, data]) => roleF === 'all' || data.role === roleF)
      .filter(([id, data]) => {
        const c = getChar(id);
        return elF === 'all' || c.element === elF;
      });
    
    if (tierChars.length === 0) continue;
    
    let section = document.createElement('div');
    section.className = 'tier-section';
    section.innerHTML = `
      <div class="tier-header ${tierClasses[t]}">
        <span class="label">${tierNames[t]}</span>
        <span style="font-size:12px;font-weight:400;opacity:0.7">(${tierChars.length})</span>
      </div>
      <div class="char-grid">
        ${tierChars.map(([id, data]) => {
          const c = getChar(id);
          const elIcon = elIcons[c.element] || '⭐';
          const elColor = elColors[c.element] || '#aaa';
          const stars = '★'.repeat(c.rarity || 4);
          return `<a href="characters/${id}.html" class="char-card">
            <img src="images/${id}.png" alt="${c.name}" loading="lazy" onerror="this.outerHTML='<span style=font-size:24px>${elIcon}</span>'">
            <div class="name">${c.name}</div>
            <div class="stars">${stars}</div>
            <span class="el-tag" style="background:${elColor}22;color:${elColor}">${elIcon}</span>
          </a>`;
        }).join('')}
      </div>
    `;
    container.appendChild(section);
  }
}

function applyFilters() {
  render();
