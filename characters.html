function rollOne(){
  wishSt.pity++;
  // 5★: base 0.6%, soft pity from 73
  let rate5 = 0.006;
  if(wishSt.pity >= 73) rate5 = 0.006 + 0.06 * (wishSt.pity - 72);
  if(wishSt.pity >= 90) rate5 = 1;

  const r = Math.random();
  if(r < rate5){
    // 5★
    wishSt.s5++;
    wishSt.pity = 0;
    const pool5 = WISH_POOL.filter(c => c.star === 5);
    const c = pool5[Math.floor(Math.random() * pool5.length)];
    return c;
  } else if(r < 0.057 + 0.006){
    // 4★ (~5.1%)
    wishSt.s4++;
    const pool4 = WISH_POOL.filter(c => c.star === 4);
    const c = pool4[Math.floor(Math.random() * pool4.length)];
    return c;
  } else {
    // 3★ weapon
    const pool3 = WISH_POOL.filter(c => c.star === 3);
    const c = pool3[Math.floor(Math.random() * pool3.length)];
    return c;
  }
}

function doWish(n){
  const cost = n * 160;
  if(wishSt.gem < cost){
    document.getElementById('wish-result').innerHTML = '<div style="color:#f66;padding:20px;text-align:center">Not enough Primogems! Click Reset to refill.</div>';
    return;
  }
  wishSt.gem -= cost;
  wishSt.wish += n;

  const resultEl = document.getElementById('wish-result');
  resultEl.innerHTML = '';
  const logEl = document.getElementById('wish-log');

  for(let i=0; i<n; i++){
    const c = rollOne();
    const starStr = '★'.repeat(c.star);
    const card = document.createElement('div');
    card.className = 'wish-card s' + c.star;
    card.innerHTML = '<img src="'+avatarURL(c.id)+'" alt="'+c.n+'" loading="lazy"><span class="wname">'+c.n+'</span><span class="wstar">'+starStr+'</span>';
    resultEl.appendChild(card);

    // Log
    const entry = document.createElement('div');
    entry.textContent = '#' + (wishSt.log.length + 1) + ' ' + c.n + ' ('+starStr+')';
    if(c.star === 5) entry.style.color = '#d4a84b';
    else if(c.star === 4) entry.style.color = '#a855f7';
    logEl.appendChild(entry);
    wishSt.log.push(c.n + ' ★'+c.star);
  }

  updateUI();
  saveSt();
}

function resetWish(){
  wishSt = {pity:0,gem:1600,wish:10,s5:0,s4:0,mode:'standard',log:[]};
  document.getElementById('wish-result').innerHTML = '';
  document.getElementById('wish-log').innerHTML = '';
  updateUI();
  saveSt();
}
</script>
