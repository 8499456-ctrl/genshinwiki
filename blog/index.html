.page-header { padding:76px 28px 24px; text-align:center; background:linear-gradient(180deg,rgba(212,168,75,0.06),transparent 80%), url(../images/bg_hero.jpg) center/cover fixed; min-height:200px; display:flex; flex-direction:column; justify-content:center; align-items:center; position:relative; }

.blog-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px 22px; margin-bottom:14px; cursor:pointer; transition:all .25s; display:block; text-decoration:none; color:inherit; }
.blog-card:hover { background:var(--bg-card-hover); border-color:var(--gold-dark); transform:translateY(-2px); }
.blog-card .meta { font-size:12px; color:var(--text-muted); margin-bottom:6px; display:flex; gap:12px; flex-wrap:wrap; }
.blog-card h2 { font-size:18px; font-weight:700; color:var(--text); margin-bottom:6px; }
.blog-card .excerpt { font-size:14px; color:var(--text-dim); line-height:1.6; }
.blog-card .tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.tag { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; background:rgba(212,168,75,0.15); color:var(--gold-light); }
.tag-tier { background:rgba(212,168,75,0.15); color:var(--gold); }
.tag-guide { background:rgba(75,196,179,0.15); color:#5dbf9a; }
.tag-meta { background:rgba(180,123,212,0.15); color:#b47bd4; }
.tag-beginner { background:rgba(74,157,214,0.15); color:#4a9dd6; }
.tag-update { background:rgba(212,168,75,0.15); color:var(--gold-light); }
.rss-link { font-size:13px; color:var(--gold); text-decoration:none; }
.rss-link:hover { text-decoration:underline; }
footer { border-top:1px solid var(--border); padding:24px 16px; text-align:center; color:var(--text-dim); font-size:13px; }
footer .links { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-bottom:10px; }
footer .links a { color:var(--text-dim); font-size:13px; text-decoration:none; }
footer .links a:hover { color:var(--gold); }
@media (max-width:768px) { nav { padding:10px 12px; } nav ul { gap:6px; } .page-header h1 { font-size:20px; } }

  const container = document.getElementById('blogList');

  const sorted = [...POSTS].sort((a, b) => {

    return new Date(b.date) - new Date(a.date);
  });
  sorted.forEach(p => {
    const isPinned = p.pinned ? '<span style="font-size:11px;color:var(--gold);margin-left:6px;">📌 Pinned</span>' : '';
    const tagColor = p.tagClass || 'tag';
    html += '<a href="' + p.id + '.html" class="blog-card">';
    html += '<div class="meta"><span>📅 ' + p.date + '</span><span>✍️ ' + p.author + '</span>' + isPinned + '</div>';
    html += '<h2>' + p.title + '</h2>';
    html += '<div class="excerpt">' + p.excerpt + '</div>';
    html += '<div class="tags">' + p.tags.map(t => '<span class="tag ' + tagColor + '">' + t + '</span>').join('') + '</div>';

    <script>
    (function(){
      var bgm=new Audio("/ys_bgm.mp3");bgm.loop=true;var mp=false;
      setInterval(function(){if(mp&&!bgm.paused)localStorage.setItem("bgm_time",bgm.currentTime)},1000);
      window.addEventListener("beforeunload",function(){if(mp&&!bgm.paused)localStorage.setItem("bgm_time",bgm.currentTime)});
      initMusic=function(){var s=localStorage.getItem("bgm_playing");var t=parseFloat(localStorage.getItem("bgm_time")||"0");if(t>0&&t<bgm.duration)bgm.currentTime=t;if(s==="true")toggleMusic()};
      toggleMusic=function(){var btn=document.getElementById("musicBtn");if(mp){bgm.pause();mp=false;if(btn){btn.classList.remove("playing");btn.textContent="♪"}localStorage.setItem("bgm_playing","false")}else{var t=parseFloat(localStorage.getItem("bgm_time")||"0");if(t>0&&t<bgm.duration)bgm.currentTime=t;bgm.play().then(function(){mp=true;if(btn){btn.classList.add("playing");btn.textContent="♫"}localStorage.setItem("bgm_playing","true")}).catch(function(e){console.log("BGM autoplay blocked:",e)})}};
      document.addEventListener("click",function o(){if(typeof initMusic==="function")initMusic();document.removeEventListener("click",o)},{once:true});
    })();
    </script>
